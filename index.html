<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Polayya Tea Stall - Receipt</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    color:#333;
}

.header{
    background:#8B4513;
    color:white;
    text-align:center;
    padding:24px 16px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.header h1{
    font-size:28px;
    margin-bottom:4px;
}

.header p{
    opacity:.9;
}

.container{
    max-width:700px;
    margin:auto;
    padding:16px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    margin-top:16px;
    box-shadow:0 2px 12px rgba(0,0,0,.08);
}

.token-box{
    text-align:center;
}

.token-label{
    color:#666;
    font-size:14px;
}

.token-number{
    font-size:64px;
    font-weight:bold;
    color:#8B4513;
    margin:8px 0;
}

.status{
    display:inline-block;
    padding:10px 18px;
    border-radius:999px;
    font-weight:bold;
    margin-top:10px;
}

.status-yellow{
    background:#fff3cd;
    color:#856404;
}

.status-green{
    background:#d4edda;
    color:#155724;
}

.status-served{
    background:#28a745;
    color:white;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.ready-message{
    margin-top:14px;
    color:#155724;
    font-weight:bold;
    font-size:14px;
}

.section-title{
    color:#8B4513;
    font-size:18px;
    font-weight:bold;
    margin-bottom:12px;
}

.info-row{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.info-row:last-child{
    border-bottom:none;
}

.invoice-table{
    width:100%;
    border-collapse:collapse;
}

.invoice-table th{
    text-align:left;
    padding:12px 6px;
    border-bottom:2px solid #ddd;
}

.invoice-table td{
    padding:12px 6px;
    border-bottom:1px solid #eee;
}

.invoice-table th:nth-child(2),
.invoice-table td:nth-child(2),
.invoice-table th:nth-child(3),
.invoice-table td:nth-child(3),
.invoice-table th:nth-child(4),
.invoice-table td:nth-child(4){
    text-align:right;
}

.total-row{
    display:flex;
    justify-content:space-between;
    margin-top:16px;
    padding-top:16px;
    border-top:2px solid #ddd;
    font-size:28px;
    font-weight:700;
    color:#8B4513;
}

.loading,
.error{
    text-align:center;
    padding:40px;
}

.error{
    color:red;
}

.footer{
    text-align:center;
    padding:24px;
    color:#777;
    font-size:13px;
}

@media(max-width:600px){

    .token-number{
        font-size:54px;
    }

    .total-row{
        font-size:24px;
    }

    .invoice-table{
        font-size:14px;
    }
}

</style>
</head>
<body>

<div class="header">
    <h1>Polayya Tea Stall</h1>
    <p>Order Receipt</p>
</div>

<div class="container">

    <div id="content" class="card">

        <div class="loading">
            Loading Receipt...
        </div>

    </div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycby159ozdlV_nwB9GcdbH3bnLZ4NzrR93cV895ppllcvvZZmwqoriPftOfp3EzyNTHN8/exec";

function formatDate(timestamp){

    const d = new Date(timestamp);

    return d.toLocaleString("en-IN",{
        day:"2-digit",
        month:"short",
        year:"numeric",
        hour:"numeric",
        minute:"2-digit",
        hour12:true
    });
}

function getStatusInfo(status){

    status = String(status || "").toLowerCase();

    if(status === "pending"){
        return {
            text:"Order Sent to Kitchen",
            className:"status-yellow"
        };
    }

    if(status === "preparing"){
        return {
            text:"Preparing",
            className:"status-yellow"
        };
    }

    if(status === "ready"){
        return {
            text:"Ready",
            className:"status-green"
        };
    }

    if(status === "served"){
        return {
            text:"✓ Served",
            className:"status-served"
        };
    }

    return {
        text:status,
        className:"status-yellow"
    };
}

async function loadOrder(){

    const orderId =
    decodeURIComponent(
        (window.location.hash || "")
        .replace(/^#\/?/,"")
    ).trim();

    if(!orderId){

        document.getElementById("content").innerHTML =
        '<div class="error">Invalid Order URL</div>';

        return;
    }

    try{

        const response = await fetch(
            API_URL +
            "?orderId=" +
            encodeURIComponent(orderId)
        );

        const data = await response.json();

        if(!data.success){

            document.getElementById("content").innerHTML =
            '<div class="error">Order Not Found</div>';

            return;
        }

        const statusInfo =
        getStatusInfo(data.status);

        let rows = "";

        data.billItems.forEach(item => {

            rows += `
            <tr>
                <td>${item.name}</td>
                <td>${item.qty}</td>
                <td>₹${item.rate}</td>
                <td>₹${item.amount}</td>
            </tr>
            `;
        });

        const readyMessage =
        String(data.status).toLowerCase() === "ready"
        ?
        `
        <div class="ready-message">
            Please show this token while collecting your order at counter
        </div>
        `
        :
        "";

        document.getElementById("content").innerHTML =
        `
        <div class="token-box">

            <div class="token-label">
                TOKEN NUMBER
            </div>

            <div class="token-number">
                ${data.tokenNo}
            </div>

            <div class="status ${statusInfo.className}">
                ${statusInfo.text}
            </div>

            ${readyMessage}

        </div>

        <div class="card">

            <div class="section-title">
                Order Details
            </div>

            <div class="info-row">
                <span>Order ID</span>
                <strong>${data.orderId}</strong>
            </div>

            <div class="info-row">
                <span>Table</span>
                <strong>${data.table}</strong>
            </div>

            <div class="info-row">
                <span>Order Time</span>
                <strong>${formatDate(data.timestamp)}</strong>
            </div>

        </div>

        <div class="card">

            <div class="section-title">
                Invoice
            </div>

            <table class="invoice-table">

                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Rate</th>
                        <th>Amount</th>
                    </tr>
                </thead>

                <tbody>
                    ${rows}
                </tbody>

            </table>

            <div class="total-row">
                <span>TOTAL</span>
                <span>₹${data.grandTotal}</span>
            </div>

        </div>

        <div class="footer">
            Thank you for visiting Polayya Tea Stall
        </div>
        `;

    }catch(error){

        console.error(error);

        document.getElementById("content").innerHTML =
        `
        <div class="error">
            Unable to load receipt
        </div>
        `;
    }
}

window.addEventListener("hashchange",loadOrder);

loadOrder();

</script>

</body>
</html>
